<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CoreInventory — Stock Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0d13;
  --bg2:#0f1420;
  --bg3:#151c2c;
  --bg4:#1c2538;
  --bg5:#222e45;
  --accent:#2563eb;
  --accent-light:#3b82f6;
  --accent-glow:rgba(37,99,235,0.15);
  --green:#16a34a;
  --green-light:#22c55e;
  --red:#dc2626;
  --red-light:#ef4444;
  --amber:#d97706;
  --amber-light:#f59e0b;
  --cyan:#0891b2;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#475569;
  --text4:#334155;
  --border:#1e2d45;
  --border2:#253450;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}

html,body{display:flex;font-family:var(--sans);font-size:13px;color:var(--text);height:100vh;overflow:hidden}
body{display:flex;font-family:var(--sans);font-size:13px;color:var(--text);height:100vh;overflow:hidden}

/* ── SCROLLBAR ─────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── SIDEBAR ───────────────────── */
#sidebar{
  width:220px;flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:relative;
  z-index:10;
}
#sidebar::before{
  content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(to bottom,transparent,var(--accent),transparent);
  opacity:.3;
}

#logo{
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.logo-icon{
  width:32px;height:32px;
  background:var(--accent);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;
  font-family:var(--mono);
  box-shadow:0 0 16px rgba(37,99,235,.4);
  flex-shrink:0;
}
.logo-text .name{font-size:14px;font-weight:600;letter-spacing:.3px;color:var(--text)}
.logo-text .sub{font-size:10px;color:var(--text3);letter-spacing:.5px;margin-top:1px;font-family:var(--mono)}

#nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{
  padding:12px 16px 4px;
  font-size:9px;color:var(--text4);
  letter-spacing:1.5px;text-transform:uppercase;
  font-family:var(--mono);font-weight:500;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;
  cursor:pointer;
  border-left:2px solid transparent;
  color:var(--text3);
  transition:all .15s;
  font-size:12.5px;
  font-weight:400;
  position:relative;
}
.nav-item:hover{background:var(--bg3);color:var(--text2);border-left-color:var(--border2)}
.nav-item.active{
  background:linear-gradient(90deg,var(--accent-glow),transparent);
  color:var(--accent-light);
  border-left-color:var(--accent-light);
  font-weight:500;
}
.nav-icon{width:15px;text-align:center;flex-shrink:0;font-size:13px}
.nav-badge{
  margin-left:auto;
  background:var(--red);
  color:#fff;
  font-size:9px;font-weight:700;
  padding:1px 5px;border-radius:8px;
  font-family:var(--mono);
}

#sidebar-footer{
  padding:14px 16px;
  border-top:1px solid var(--border);
}
.user-row{
  display:flex;align-items:center;gap:10px;
  cursor:pointer;
  padding:8px 10px;border-radius:8px;
  transition:background .15s;
}
.user-row:hover{background:var(--bg3)}
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
  font-family:var(--mono);
  box-shadow:0 0 10px rgba(37,99,235,.3);
}
.user-info .uname{font-size:12px;font-weight:500;color:var(--text)}
.user-info .urole{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:1px}

/* ── MAIN ──────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

#topbar{
  height:52px;flex-shrink:0;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 22px;gap:14px;
}
#topbar h1{font-size:15px;font-weight:600;color:var(--text);flex:1;font-family:var(--mono);letter-spacing:.3px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
#search-input{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:7px;
  padding:7px 10px 7px 32px;
  color:var(--text);font-family:var(--mono);font-size:12px;
  width:200px;outline:none;transition:border .15s,width .2s;
}
#search-input:focus{border-color:var(--accent);width:240px}
#search-input::placeholder{color:var(--text3)}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:7px;
  border:none;cursor:pointer;
  font-family:var(--mono);font-size:12px;font-weight:500;
  transition:all .15s;letter-spacing:.2px;
}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 12px rgba(37,99,235,.3)}
.btn-primary:hover{background:var(--accent-light);box-shadow:0 0 20px rgba(37,99,235,.4);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:var(--green-light);transform:translateY(-1px)}
.btn-danger{background:transparent;color:var(--red-light);border:1px solid var(--red)}
.btn-danger:hover{background:rgba(220,38,38,.1)}
.btn-sm{padding:5px 10px;font-size:11px}

#content{flex:1;overflow-y:auto;padding:22px}

/* ── CARDS ─────────────────────── */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px;
  margin-bottom:18px;
  position:relative;
  overflow:hidden;
}
.card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--border2),transparent);
}
.card-title{
  font-size:10px;font-weight:600;
  color:var(--text3);
  letter-spacing:1.2px;text-transform:uppercase;
  font-family:var(--mono);
  margin-bottom:14px;
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-header .card-title{margin:0}

/* ── KPI GRID ──────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:16px 14px;
  position:relative;overflow:hidden;
  transition:border-color .2s,transform .15s;
  cursor:default;
}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--kpi-color,var(--border2));
  opacity:.6;
}
.kpi-icon{font-size:18px;margin-bottom:8px;opacity:.7}
.kpi-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:600;font-family:var(--mono);color:var(--text);line-height:1}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:4px}
.kpi.blue{--kpi-color:var(--accent-light)}.kpi.blue .kpi-val{color:var(--accent-light)}
.kpi.green{--kpi-color:var(--green-light)}.kpi.green .kpi-val{color:var(--green-light)}
.kpi.amber{--kpi-color:var(--amber-light)}.kpi.amber .kpi-val{color:var(--amber-light)}
.kpi.red{--kpi-color:var(--red-light)}.kpi.red .kpi-val{color:var(--red-light)}

/* ── TABLE ─────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{
  text-align:left;font-size:9px;color:var(--text3);
  text-transform:uppercase;letter-spacing:1px;
  padding:8px 10px;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-weight:500;
  white-space:nowrap;
}
td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);font-size:12.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.mono{font-family:var(--mono)}
td.sku{font-family:var(--mono);color:var(--accent-light);font-size:11px}

/* ── BADGES ────────────────────── */
.badge{
  display:inline-block;padding:3px 8px;border-radius:5px;
  font-size:10px;font-weight:600;letter-spacing:.4px;
  font-family:var(--mono);text-transform:uppercase;
}
.b-draft{background:rgba(71,85,105,.2);color:#64748b;border:1px solid rgba(71,85,105,.3)}
.b-waiting{background:rgba(217,119,6,.15);color:var(--amber-light);border:1px solid rgba(217,119,6,.3)}
.b-ready{background:rgba(37,99,235,.15);color:var(--accent-light);border:1px solid rgba(37,99,235,.3)}
.b-done{background:rgba(22,163,74,.15);color:var(--green-light);border:1px solid rgba(22,163,74,.3)}
.b-canceled{background:rgba(100,116,139,.1);color:var(--text3);border:1px solid var(--border)}
.b-instock{background:rgba(22,163,74,.12);color:var(--green-light);border:1px solid rgba(22,163,74,.25)}
.b-low{background:rgba(217,119,6,.12);color:var(--amber-light);border:1px solid rgba(217,119,6,.25)}
.b-out{background:rgba(220,38,38,.12);color:var(--red-light);border:1px solid rgba(220,38,38,.25)}

/* ── FORM ──────────────────────── */
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:140px}
.lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
input,select,textarea{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:7px;padding:8px 11px;
  color:var(--text);font-family:var(--mono);font-size:12px;
  outline:none;width:100%;transition:border .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--bg3);color:var(--text)}
input::placeholder,textarea::placeholder{color:var(--text3)}

/* ── MODAL ─────────────────────── */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:200;
  align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
#modal-overlay.open{display:flex;animation:fadeIn .15s ease}
#modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:12px;padding:24px;
  width:580px;max-width:95vw;max-height:88vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 0 1px rgba(37,99,235,.1);
  animation:slideUp .2s ease;
}
#modal h2{font-size:15px;font-weight:600;margin-bottom:18px;color:var(--text);font-family:var(--mono)}
.modal-actions{
  display:flex;gap:8px;justify-content:flex-end;
  margin-top:18px;padding-top:16px;border-top:1px solid var(--border);
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── ALERT ─────────────────────── */
#alert-bar{
  display:none;position:fixed;
  bottom:20px;right:20px;z-index:300;
  padding:12px 18px;border-radius:9px;
  font-size:12px;font-weight:600;font-family:var(--mono);
  box-shadow:0 8px 30px rgba(0,0,0,.4);
  animation:slideAlert .25s ease;
}
@keyframes slideAlert{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── FILTERS ───────────────────── */
.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:.8px;text-transform:uppercase;margin-right:4px}
.fpill{
  padding:4px 11px;border-radius:20px;
  border:1px solid var(--border);
  cursor:pointer;font-size:11px;color:var(--text3);
  font-family:var(--mono);transition:all .12s;
  background:transparent;
}
.fpill:hover{border-color:var(--border2);color:var(--text2)}
.fpill.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── PROGRESS BAR ──────────────── */
.pbar-wrap{background:var(--bg4);border-radius:4px;height:5px;overflow:hidden;margin-top:5px}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s ease}

/* ── STEPS ─────────────────────── */
.steps{display:flex;margin-bottom:16px;padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.step{flex:1;text-align:center;position:relative}
.step::after{content:'';position:absolute;top:10px;left:50%;right:-50%;height:1px;background:var(--border)}
.step:last-child::after{display:none}
.step-dot{
  width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--text4);
  background:var(--bg2);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--text3);
  position:relative;z-index:1;margin-bottom:5px;font-family:var(--mono);
}
.step.done .step-dot{background:var(--green);border-color:var(--green);color:#fff}
.step.active .step-dot{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 10px rgba(37,99,235,.5)}
.step-label{font-size:9px;color:var(--text3);font-family:var(--mono)}
.step.active .step-label{color:var(--accent-light)}

/* ── GRID LAYOUTS ──────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── MOVEMENT TYPES ────────────── */
.mv-receipt{color:var(--green-light)}
.mv-delivery{color:var(--red-light)}
.mv-transfer{color:var(--accent-light)}
.mv-adjustment{color:var(--amber-light)}

/* ── PAGE LOAD ANIMATION ───────── */
#content > *{animation:fadeInUp .25s ease both}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── WAREHOUSE CARDS ───────────── */
.wh-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:16px;
  transition:border-color .2s,transform .15s;
}
.wh-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.wh-icon{font-size:22px;margin-bottom:8px}
.wh-name{font-size:14px;font-weight:600;margin-bottom:6px;font-family:var(--mono)}
.wh-meta{font-size:11px;color:var(--text3)}

/* ── QTY DISPLAY ───────────────── */
.qty-pos{color:var(--green-light);font-weight:600}
.qty-neg{color:var(--red-light);font-weight:600}
.qty-big{font-size:18px;font-weight:700;font-family:var(--mono)}

/* ── DIVIDER ───────────────────── */
.divider{height:1px;background:var(--border);margin:14px 0}

/* ── EMPTY STATE ───────────────── */
.empty{text-align:center;padding:40px;color:var(--text3);font-family:var(--mono);font-size:12px}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.3}

</style>
</head>
<body>


<!-- SIDEBAR -->
<div id="sidebar">
  <div id="logo">
    <div class="logo-icon">C</div>
    <div class="logo-text">
      <div class="name">CoreInventory</div>
      <div class="sub">IMS v1.0</div>
    </div>
  </div>
  <nav id="nav">
    <div class="nav-section">Overview</div>
    <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
      <span class="nav-icon">▦</span>Dashboard
    </div>
    <div class="nav-section">Catalog</div>
    <div class="nav-item" onclick="navigate('products')" id="nav-products">
      <span class="nav-icon">⊞</span>Products
    </div>
    <div class="nav-section">Operations</div>
    <div class="nav-item" onclick="navigate('receipts')" id="nav-receipts">
      <span class="nav-icon">↓</span>Receipts
    </div>
    <div class="nav-item" onclick="navigate('deliveries')" id="nav-deliveries">
      <span class="nav-icon">↑</span>Delivery Orders
    </div>
    <div class="nav-item" onclick="navigate('transfers')" id="nav-transfers">
      <span class="nav-icon">⇄</span>Transfers
    </div>
    <div class="nav-item" onclick="navigate('adjustments')" id="nav-adjustments">
      <span class="nav-icon">∓</span>Adjustments
    </div>
    <div class="nav-item" onclick="navigate('history')" id="nav-history">
      <span class="nav-icon">≡</span>Move History
    </div>
    <div class="nav-section">Settings</div>
    <div class="nav-item" onclick="navigate('warehouses')" id="nav-warehouses">
      <span class="nav-icon">◫</span>Warehouses
    </div>
  </nav>
  <div id="sidebar-footer">
    <div class="user-row">
      <div class="avatar">IM</div>
      <div class="user-info">
        <div class="uname">Inv. Manager</div>
        <div class="urole">admin</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <h1 id="page-title">Dashboard</h1>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" placeholder="Search SKU, product..." oninput="handleSearch(this.value)"/>
    </div>
    <button class="btn btn-primary" id="topbar-btn" onclick="topbarAction()" style="display:none">+ New</button>
  </div>
  <div id="content"></div>
</div>


<!-- MODAL -->
<div id="modal-overlay" onclick="overlayClose(event)">
  <div id="modal">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div id="modal-actions" class="modal-actions"></div>
  </div>
</div>

<!-- ALERT -->
<div id="alert-bar"></div>

<script>
// ==============================
// STATE
// ==============================

    {id:'P005',name:'Motor Oil 5W40',sku:'LUB-MOT-005',category:'Lubricants',uom:'L',stock:200,location:'Main Warehouse',reorder:30},
    {id:'P006',name:'Angle Grinders',sku:'TLS-AGR-006',category:'Tools',uom:'pcs',stock:12,location:'Production Floor',reorder:5},

    {id:'REC-004',supplier:'SafeGear Inc',date:'2026-03-15',status:'draft',items:[{sku:'SAF-HLM-004',qty:30}]},
  ],
  deliveries: [
    {id:'DEL-001',customer:'Acme Corp',date:'2026-03-11',status:'done',items:[{sku:'STL-ROD-001',qty:20}]},
    {id:'DEL-002',customer:'BuildRight Co',date:'2026-03-13',status:'ready',items:[{sku:'FRN-CHR-002',qty:5}]},
    {id:'DEL-003',customer:'SafeWorks Ltd',date:'2026-03-15',status:'draft',items:[{sku:'SAF-HLM-004',qty:10}]},

// ==============================
// HELPERS
// ==============================
function badge(s){
  const m={draft:'b-draft',waiting:'b-waiting',ready:'b-ready',done:'b-done',canceled:'b-canceled'};
  return`<span class="badge ${m[s]||'b-draft'}">${s.toUpperCase()}</span>`;
}
function qtyBadge(n){return`<span class="${n>0?'qty-pos':'qty-neg'}">${n>0?'+':''}${n}</span>`;}
function today(){return new Date().toISOString().slice(0,10);}
function genId(prefix,arr){return`${prefix}-${String(arr.length+101).padStart(3,'0')}`;}

// ==============================
// NAVIGATION
// ==============================
const PAGE_CONFIG = {
  dashboard:{title:'Dashboard',btn:''},
  products:{title:'Products',btn:'+ Add Product'},
  receipts:{title:'Receipts',btn:'+ New Receipt'},
  deliveries:{title:'Delivery Orders',btn:'+ New Delivery'},
  transfers:{title:'Internal Transfers',btn:'+ New Transfer'},
  adjustments:{title:'Stock Adjustments',btn:'+ New Adjustment'},
  history:{title:'Move History',btn:''},
  warehouses:{title:'Warehouses',btn:'+ Add Location'},
};

function navigate(page){
  S.page = page;
  S.statusFilter = 'all';
  S.selectedWarehouse = null;
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav = document.getElementById('nav-'+page);
  if(nav) nav.classList.add('active');
  const cfg = PAGE_CONFIG[page]||{title:page,btn:''};
  document.getElementById('page-title').textContent = cfg.title;
  const btn = document.getElementById('topbar-btn');
  if(cfg.btn){btn.textContent=cfg.btn;btn.style.display='';}
  else btn.style.display='none';
  render();
}

function topbarAction(){
  const m={products:openAddProduct,receipts:openNewReceipt,deliveries:openNewDelivery,transfers:openNewTransfer,adjustments:openNewAdjustment,warehouses:openAddWarehouse};
  if(m[S.page]) m[S.page]();
}

function handleSearch(v){render(v);}

// ==============================
// RENDER ROUTER
// ==============================
function render(search=''){
  const el = document.getElementById('content');
  el.innerHTML = '';
  const fns = {
    dashboard:renderDashboard,products:renderProducts,
    receipts:()=>renderOps('receipts',S.receipts),
    deliveries:()=>renderOps('deliveries',S.deliveries),
    transfers:()=>renderOps('transfers',S.transfers),
    adjustments:renderAdjustments,history:renderHistory,
    warehouses:()=>S.selectedWarehouse?renderWarehouseDetail(S.selectedWarehouse,search):renderWarehouses(search)
  };
  el.innerHTML = (fns[S.page]||renderDashboard)(search);
}

// ==============================
// OPERATIONS (Receipts/Deliveries/Transfers)
// ==============================
function renderOps(type,data,search=''){
  let ops=[...data];
  if(S.statusFilter!=='all')ops=ops.filter(o=>o.status===S.statusFilter);
  if(search)ops=ops.filter(o=>o.id.toLowerCase().includes(search.toLowerCase())||(o.supplier||o.customer||o.from||'').toLowerCase().includes(search.toLowerCase()));
  ops=ops.reverse();
  const isR=type==='receipts',isD=type==='deliveries',isT=type==='transfers';
  const col=isR?'Supplier':isD?'Customer':'Route';
  const statuses=['all','draft','waiting','ready','done','canceled'];
  return`
<div class="filter-bar">
  <span class="filter-label">Status:</span>
  ${statuses.map(s=>`<div class="fpill ${S.statusFilter===s?'active':''}" onclick="setFilter('${s}')">${s==='all'?'All':s.charAt(0).toUpperCase()+s.slice(1)}</div>`).join('')}
</div>
<div class="card">
  <div class="card-header">
    <div class="card-title">${PAGE_CONFIG[type]?.title} (${ops.length})</div>
  </div>
  <div class="tbl-wrap"><table>
    <tr><th>Reference</th><th>${col}</th><th>Date</th><th>Lines</th><th>Status</th><th>Actions</th></tr>
    ${ops.length===0?`<tr><td colspan="6"><div class="empty"><div class="empty-icon">≡</div>No records match filter</div></td></tr>`:
    ops.map(o=>{
      const party=isR?o.supplier:isD?o.customer:`${o.from} → ${o.to}`;
      return`<tr>
        <td class="sku">${o.id}</td>
        <td style="font-weight:500">${party}</td>
        <td class="mono" style="color:var(--text3);font-size:11px">${o.date}</td>
        <td style="color:var(--text3)">${o.items.length} line${o.items.length>1?'s':''}</td>
        <td>${badge(o.status)}</td>
        <td>
          <div style="display:flex;gap:5px">
            <button class="btn btn-ghost btn-sm" onclick="viewOp('${type}','${o.id}')">View</button>
            ${!['done','canceled'].includes(o.status)?`<button class="btn btn-success btn-sm" onclick="validateOp('${type}','${o.id}')">Validate</button>`:''}
          </div>
        </td>
      </tr>`;
    }).join('')}
  </table></div>
</div>`;
}

    <div class="tbl-wrap"><table>
      <tr><th>SKU</th><th>Product Name</th><th>Category</th><th>UOM</th><th>Stock Qty</th><th>Reorder At</th><th>Status</th><th>Actions</th></tr>
      ${prods.map(p=>{
        const isOut=p.stock===0,isLow=p.stock>0&&p.stock<=p.reorder;
        const pct=p.reorder?Math.min(100,p.stock/p.reorder*100):100;
        return`<tr>
          <td class="sku">${p.sku}</td>
          <td style="font-weight:500">${p.name}</td>
          <td style="color:var(--text2)">${p.category}</td>
          <td class="mono" style="color:var(--text3)">${p.uom}</td>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <span class="qty-big" style="color:${isOut?'var(--red-light)':isLow?'var(--amber-light)':'var(--text)'}">${p.stock}</span>
              <div style="width:60px">
                <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%;background:${isOut?'var(--red-light)':isLow?'var(--amber-light)':'var(--green-light)'}"></div></div>
              </div>
            </div>
          </td>
          <td class="mono" style="color:var(--text3)">${p.reorder}</td>
          <td>${isOut?'<span class="badge b-out">OUT</span>':isLow?'<span class="badge b-low">LOW</span>':'<span class="badge b-instock">OK</span>'}</td>
          <td>
            <div style="display:flex;gap:4px">
              <button class="btn btn-ghost btn-sm" onclick="editProduct('${p.id}')">Edit</button>
              <button class="btn btn-ghost btn-sm" style="color:var(--accent-light)" onclick="quickTransfer('${p.id}')">Transfer</button>
            </div>
          </td>
        </tr>`;
      }).join('')}
    </table></div>`}
  </div>

  <!-- Sidebar: Recent movements + Category breakdown -->
  <div style="display:flex;flex-direction:column;gap:14px">
    <!-- Category breakdown -->
    <div class="card">
      <div class="card-title">Stock by Category</div>
      ${cats.length===0?`<div style="color:var(--text3);font-size:12px">No products here yet</div>`:`
      ${cats.map(c=>{
        const cp=S.products.filter(p=>p.location===whName&&p.category===c);
        const cs=cp.reduce((a,p)=>a+p.stock,0);
        const pct=total>0?Math.round(cs/total*100):0;
        return`<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:12px;color:var(--text2)">${c}</span>
            <span class="mono" style="font-size:11px;color:var(--text3)">${cp.length} items · ${cs} units</span>
          </div>
          <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%;background:var(--accent)"></div></div>
        </div>`;
      }).join('')}`}
    </div>

    <!-- Recent movements -->
    <div class="card">
      <div class="card-title">Recent Movements</div>
      ${recentMoves.length===0?`<div style="color:var(--text3);font-size:12px">No recent movements</div>`:`
      ${recentMoves.map(l=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:11px;font-weight:500;color:var(--text)" class="mv-${l.type.toLowerCase()}">${l.type}</div>
          <div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${l.ref} · ${l.date}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px">${qtyBadge(l.qty)}</div>
          <div style="font-size:10px;color:var(--text3)">${l.product}</div>
        </div>
      </div>`).join('')}`}
    </div>

    <!-- Quick actions -->
    <div class="card">
      <div class="card-title">Quick Actions</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        <button class="btn btn-ghost" style="justify-content:flex-start" onclick="S.page='receipts';S.selectedWarehouse=null;navigate('receipts')">↓ &nbsp;New Receipt into ${whName.split(' ')[0]}</button>
        <button class="btn btn-ghost" style="justify-content:flex-start" onclick="S.page='transfers';S.selectedWarehouse=null;navigate('transfers')">⇄ &nbsp;New Transfer from ${whName.split(' ')[0]}</button>
        <button class="btn btn-ghost" style="justify-content:flex-start" onclick="S.page='adjustments';S.selectedWarehouse=null;navigate('adjustments')">∓ &nbsp;Stock Adjustment</button>
      </div>
    </div>
  </div>
</div>`;
}

function quickTransfer(productId){
  S.selectedWarehouse=null;
  openNewTransfer(productId);
}

// ==============================
// MODALS
// ==============================
function openModal(title,body,actions){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-actions').innerHTML=actions;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function overlayClose(e){if(e.target.id==='modal-overlay')closeModal();}

function toast(msg,ok=true){
  const el=document.getElementById('alert-bar');
  el.textContent=msg;
  el.style.cssText=`display:block;background:${ok?'var(--green)':'var(--red)'};color:#fff;padding:12px 18px;border-radius:9px;position:fixed;bottom:20px;right:20px;z-index:300;font-family:var(--mono);font-size:12px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:slideAlert .25s ease`;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display='none',3000);
}

// ADD PRODUCT
function openAddProduct(){
  openModal('Add New Product',`
<div class="form-row">
  <div class="form-group"><label class="lbl">Product Name *</label><input id="pname" placeholder="e.g. Steel Rods"/></div>
  <div class="form-group"><label class="lbl">SKU / Code</label><input id="psku" placeholder="e.g. STL-ROD-001"/></div>
</div>
<div class="form-row">
  <div class="form-group"><label class="lbl">Category</label><select id="pcat">${S.categories.map(c=>`<option>${c}</option>`).join('')}</select></div>
  <div class="form-group"><label class="lbl">Unit of Measure</label><select id="puom"><option>kg</option><option>pcs</option><option>m</option><option>L</option><option>box</option><option>ton</option></select></div>
</div>
<div class="form-row">
  <div class="form-group"><label class="lbl">Initial Stock</label><input id="pstock" type="number" value="0" min="0"/></div>
  <div class="form-group"><label class="lbl">Reorder Level</label><input id="preorder" type="number" value="10" min="0"/></div>
</div>
<div class="form-group"><label class="lbl">Warehouse Location</label><select id="ploc">${S.warehouses.map(w=>`<option>${w}</option>`).join('')}</select></div>`,
`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
 <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>`);
}

function saveProduct(){
  const name=document.getElementById('pname').value.trim();
  if(!name){toast('Product name is required',false);return;}
  const sku=document.getElementById('psku').value.trim()||'SKU-'+Date.now();
  const id='P'+String(S.products.length+1).padStart(3,'0');
  const stock=parseInt(document.getElementById('pstock').value)||0;
  const loc=document.getElementById('ploc').value;
  S.products.push({id,name,sku,category:document.getElementById('pcat').value,uom:document.getElementById('puom').value,stock,location:loc,reorder:parseInt(document.getElementById('preorder').value)||10});
  if(stock>0)S.ledger.push({date:today(),type:'Receipt',ref:'INIT',product:name,qty:stock,loc});
  closeModal();toast('Product added ✓');render();
}

// EDIT PRODUCT
function editProduct(id){
  const p=S.products.find(x=>x.id===id);
  if(!p)return;
  openModal(`Edit: ${p.name}`,`
<div class="form-row">
  <div class="form-group"><label class="lbl">Name</label><input id="epn" value="${p.name}"/></div>
  <div class="form-group"><label class="lbl">SKU (read-only)</label><input value="${p.sku}" readonly style="opacity:.5;cursor:not-allowed"/></div>
</div>
<div class="form-row">
  <div class="form-group"><label class="lbl">Stock Quantity</label><input id="epstock" type="number" value="${p.stock}" min="0"/></div>
  <div class="form-group"><label class="lbl">Reorder Level</label><input id="epreorder" type="number" value="${p.reorder}" min="0"/></div>
</div>
<div class="form-group"><label class="lbl">Location</label><select id="eploc">${S.warehouses.map(w=>`<option ${w===p.location?'selected':''}>${w}</option>`).join('')}</select></div>`,
`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
 <button class="btn btn-primary" onclick="saveEditProduct('${id}')">Save Changes</button>`);
}

function saveEditProduct(id){
  const p=S.products.find(x=>x.id===id);
  p.name=document.getElementById('epn').value||p.name;
  const ns=parseInt(document.getElementById('epstock').value);
  if(!isNaN(ns)&&ns!==p.stock){
    const delta=ns-p.stock;
    S.ledger.push({date:today(),type:'Adjustment',ref:'MAN-ADJ',product:p.name,qty:delta,loc:p.location});
    p.stock=ns;
  }
  p.reorder=parseInt(document.getElementById('epreorder').value)||p.reorder;
  p.location=document.getElementById('eploc').value;
  closeModal();toast('Product updated ✓');render();
}

// NEW RECEIPT
function openNewReceipt(){
  openModal('New Receipt',`
<div class="form-row">
  <div class="form-group"><label class="lbl">Supplier Name</label><input id="rsup" placeholder="Supplier..."/></div>
  <div class="form-group"><label class="lbl">Date</label><input id="rdate" type="date" value="${today()}"/></div>
</div>
<div class="form-group" style="margin-bottom:12px"><label class="lbl">Product</label><select id="rprod">${S.products.map(p=>`<option value="${p.sku}">${p.name} [${p.sku}]</option>`).join('')}</select></div>
<div class="form-group"><label class="lbl">Quantity Received</label><input id="rqty" type="number" value="1" min="1"/></div>`,
`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
 <button class="btn btn-primary" onclick="saveReceipt()">Create Receipt</button>`);
}

function saveReceipt(){
  const sup=document.getElementById('rsup').value.trim()||'Unknown Supplier';
  const sku=document.getElementById('rprod').value;
  const qty=parseInt(document.getElementById('rqty').value)||1;
  const date=document.getElementById('rdate').value;
  const id=genId('REC',S.receipts);
  S.receipts.push({id,supplier:sup,date,status:'draft',items:[{sku,qty}]});
  closeModal();toast('Receipt created (Draft)');render();
}

// NEW DELIVERY
function openNewDelivery(){
  openModal('New Delivery Order',`
<div class="form-row">
  <div class="form-group"><label class="lbl">Customer</label><input id="dcust" placeholder="Customer name..."/></div>
  <div class="form-group"><label class="lbl">Date</label><input id="ddate" type="date" value="${today()}"/></div>
</div>
<div class="form-group" style="margin-bottom:12px"><label class="lbl">Product</label><select id="dprod">${S.products.map(p=>`<option value="${p.sku}">${p.name} [Stock: ${p.stock} ${p.uom}]</option>`).join('')}</select></div>
<div class="form-group"><label class="lbl">Quantity to Ship</label><input id="dqty" type="number" value="1" min="1"/></div>`,
`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
 <button class="btn btn-primary" onclick="saveDelivery()">Create Delivery</button>`);
}

function saveDelivery(){
  const cust=document.getElementById('dcust').value.trim()||'Unknown Customer';
  const sku=document.getElementById('dprod').value;
  const qty=parseInt(document.getElementById('dqty').value)||1;
  const date=document.getElementById('ddate').value;
  const id=genId('DEL',S.deliveries);
  S.deliveries.push({id,customer:cust,date,status:'draft',items:[{sku,qty}]});
  closeModal();toast('Delivery Order created (Draft)');render();
}

// NEW TRANSFER
function openNewTransfer(preProductId=''){
  const wOpts=S.warehouses.map(w=>`<option>${w}</option>`).join('');
  openModal('New Internal Transfer',`
<div class="form-row">
  <div class="form-group"><label class="lbl">From Location</label><select id="tfrom">${wOpts}</select></div>
  <div class="form-group"><label class="lbl">To Location</label><select id="tto">${wOpts}</select></div>
</div>
<div class="form-group" style="margin-bottom:12px"><label class="lbl">Product</label><select id="tprod">${S.products.map(p=>`<option value="${p.sku}" ${p.id===preProductId?'selected':''}>${p.name} [${p.stock} ${p.uom}]</option>`).join('')}</select></div>
<div class="form-group"><label class="lbl">Quantity</label><input id="tqty" type="number" value="1" min="1"/></div>`,
`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
 <button class="btn btn-primary" onclick="saveTransfer()">Create Transfer</button>`);
  // Pre-fill from location if coming from warehouse detail
  if(preProductId){
    const prod=S.products.find(p=>p.id===preProductId);
    if(prod){
      const fromSel=document.getElementById('tfrom');
      for(let i=0;i<fromSel.options.length;i++){if(fromSel.options[i].value===prod.location){fromSel.selectedIndex=i;break;}}
    }
  }
}

function saveTransfer(){
  const from=document.getElementById('tfrom').value;
  const to=document.getElementById('tto').value;
  if(from===to){toast('Source and destination must be different',false);return;}
  const sku=document.getElementById('tprod').value;
  const qty=parseInt(document.getElementById('tqty').value)||1;
  const id=genId('TRF',S.transfers);
  S.transfers.push({id,from,to,date:today(),status:'draft',items:[{sku,qty}]});
  closeModal();toast('Transfer created (Draft)');render();
}

// NEW ADJUSTMENT
function openNewAdjustment(){
  openModal('Stock Adjustment',`
<p style="color:var(--text3);font-size:12px;margin-bottom:14px">Enter the physical counted quantity. The system will calculate and log the difference.</p>
<div class="form-group" style="margin-bottom:12px"><label class="lbl">Product</label>
<select id="aprod">${S.products.map(p=>`<option value="${p.id}">${p.name} — Current Stock: ${p.stock} ${p.uom}</option>`).join('')}</select></div>
<div class="form-row">
  <div class="form-group"><label class="lbl">Counted Quantity</label><input id="anewqty" type="number" min="0" placeholder="Physical count..."/></div>
  <div class="form-group"><label class="lbl">Reason</label><select id="areason"><option>Physical Count</option><option>Damaged Goods</option><option>Expired Stock</option><option>Found Extra</option><option>System Correction</option><option>Theft / Loss</option></select></div>
</div>
<div class="form-group"><label class="lbl">Notes</label><input id="anote" placeholder="Optional note..."/></div>`,
`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
 <button class="btn btn-primary" onclick="saveAdjustment()">Apply Adjustment</button>`);
}

function saveAdjustment(){
  const pid=document.getElementById('aprod').value;
  const prod=S.products.find(p=>p.id===pid);
  const newQty=parseInt(document.getElementById('anewqty').value);
  if(isNaN(newQty)||newQty<0){toast('Enter a valid quantity',false);return;}
  const reason=document.getElementById('areason').value;
  const note=document.getElementById('anote').value;
  const oldQty=prod.stock;
  const id=genId('ADJ',S.adjustments);
  S.adjustments.push({id,productId:prod.id,product:prod.sku,reason,oldQty,newQty,date:today(),note});
  S.ledger.push({date:today(),type:'Adjustment',ref:id,product:prod.name,qty:newQty-oldQty,loc:prod.location});
  prod.stock=newQty;
  closeModal();toast(`Adjusted: ${oldQty} → ${newQty} (${newQty-oldQty>=0?'+':''}${newQty-oldQty})`);render();
}

// ADD WAREHOUSE
function openAddWarehouse(){
  openModal('Add Warehouse / Location',`
<div class="form-group"><label class="lbl">Location Name</label><input id="wname" placeholder="e.g. Warehouse C, Rack D, Zone 3"/></div>`,
`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
 <button class="btn btn-primary" onclick="saveWarehouse()">Add Location</button>`);
}

function saveWarehouse(){
  const n=document.getElementById('wname').value.trim();
  if(!n){toast('Name required',false);return;}
  if(S.warehouses.includes(n)){toast('Location already exists',false);return;}
  S.warehouses.push(n);closeModal();toast('Location added ✓');render();
}

// VIEW OPERATION DETAIL
function viewOp(type,id){
  const map={receipts:S.receipts,deliveries:S.deliveries,transfers:S.transfers};
  const op=map[type].find(o=>o.id===id);
  if(!op)return;
  const isR=type==='receipts',isD=type==='deliveries',isT=type==='transfers';
  const partyLabel=isR?'Supplier':isD?'Customer':'Route';
  const partyVal=isR?op.supplier:isD?op.customer:`${op.from} → ${op.to}`;
  const itemsHtml=op.items.map(it=>{
    const prod=S.products.find(p=>p.sku===it.sku);
    return`<tr>
      <td class="sku">${it.sku}</td>
      <td>${prod?prod.name:'—'}</td>
      <td class="mono" style="font-weight:700">${it.qty}</td>
      <td style="color:var(--text3)">${prod?prod.uom:'—'}</td>
    </tr>`;
  }).join('');
  const canValidate=!['done','canceled'].includes(op.status);
  openModal(op.id,`
<div style="display:flex;gap:20px;margin-bottom:16px">
  <div><div class="lbl">${partyLabel}</div><div style="margin-top:4px;font-weight:600">${partyVal}</div></div>
  <div><div class="lbl">Date</div><div class="mono" style="margin-top:4px">${op.date}</div></div>
  <div><div class="lbl">Status</div><div style="margin-top:4px">${badge(op.status)}</div></div>
</div>
<div class="divider"></div>
<div class="card-title" style="margin-bottom:8px">Line Items</div>
<div class="tbl-wrap"><table>
  <tr><th>SKU</th><th>Product</th><th>Qty</th><th>UOM</th></tr>
  ${itemsHtml}
</table></div>`,
`<button class="btn btn-ghost" onclick="closeModal()">Close</button>
 ${canValidate?`<button class="btn btn-success" onclick="validateOp('${type}','${id}');closeModal()">✓ Validate & Apply Stock</button>`:''}`);
}

// VALIDATE OPERATION
function validateOp(type,id){
  const map={receipts:S.receipts,deliveries:S.deliveries,transfers:S.transfers};
  const op=map[type].find(o=>o.id===id);
  if(!op||op.status==='done')return;
  let err='';
  op.items.forEach(item=>{
    const prod=S.products.find(p=>p.sku===item.sku);
    if(!prod){err=`SKU ${item.sku} not found`;return;}
    if(type==='receipts'){
      prod.stock+=item.qty;
      S.ledger.push({date:op.date,type:'Receipt',ref:op.id,product:prod.name,qty:+item.qty,loc:prod.location});
    } else if(type==='deliveries'){
      if(prod.stock<item.qty){err=`Insufficient stock for ${prod.name} (need ${item.qty}, have ${prod.stock})`;return;}
      prod.stock=Math.max(0,prod.stock-item.qty);
      S.ledger.push({date:op.date,type:'Delivery',ref:op.id,product:prod.name,qty:-item.qty,loc:prod.location});
    } else if(type==='transfers'){
      S.ledger.push({date:op.date,type:'Transfer',ref:op.id,product:prod.name,qty:item.qty,loc:`${op.from} → ${op.to}`});
    }
  });
  if(err){toast(err,false);return;}
  op.status='done';
  toast(`${op.id} validated — stock updated ✓`);render();
}

navigate('dashboard');
